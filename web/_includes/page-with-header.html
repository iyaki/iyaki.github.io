---
layout: default.html
---
<style>
main {
  padding: 1em;
  margin: auto;
  max-width: var(--main-content-width);

  p {
    margin-bottom: 2em;
    text-align: left;
  }
}

body > header {
  text-align: center;
  margin-bottom: 2em;

  a {
    text-decoration: none;
    color: var(--text-color);
    display: inline-block;
  }

  h1 {
    margin: 0;
  }

  p {
    margin: 0;

    &::before, &::after {
      content: '– ';
    }
  }
}

@media (hover: hover) and (pointer: fine) {
  body > header a:hover {
    text-decoration: underline;

    .logo {
      transform: scale(1.05);
    }
  }
}
</style>

<header>
<a href="/" title="Website personal de Iván Yakimovicz">
<figure>
<img
    src="/images/logo.svg"
    alt="Logo de mi web, unos anteojos 3D de cartón blanco con celofán azul y rojo"
    class="logo"
    width="64"
    height="64"
    style="view-transition-name: logo"
>
</figure>
<h1 class="iyaki"><span style="view-transition-name: iyaki">iyaki</span></h1>
</a>
<p>
Generalista Tecnológico
</p>
</header>
<main id="main">
{{ content }}
</main>
